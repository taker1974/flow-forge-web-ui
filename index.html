<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowForge — Design workflows. Run instances.</title>
    <style>
      :root {
        --bg: #0f172a;
        --text: #e5e7eb;
        --text-muted: #94a3b8;
        --accent: #38bdf8;
        --accent-hover: #7dd3fc;
        --border: rgba(148, 163, 184, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: radial-gradient(
          circle at top left,
          #1e293b 0,
          #020617 45%,
          #000000 100%
        );
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .shell {
        text-align: center;
        max-width: 720px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .tagline {
        margin: 0 0 40px;
        font-size: 1rem;
        color: var(--text-muted);
        line-height: 1.5;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        align-items: stretch;
      }

      .links a {
        flex: 1 1 240px;
        max-width: 320px;
        padding: 28px 24px;
        border-radius: 12px;
        text-decoration: none;
        color: var(--text);
        background: linear-gradient(
          145deg,
          rgba(15, 23, 42, 0.95),
          rgba(2, 6, 23, 0.98)
        );
        border: 1px solid var(--border);
        box-shadow:
          0 24px 80px rgba(15, 23, 42, 0.5),
          inset 0 0 0 1px rgba(15, 23, 42, 0.9);
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease,
          transform 0.15s ease;
      }

      .links a:hover {
        border-color: rgba(56, 189, 248, 0.45);
        box-shadow:
          0 24px 80px rgba(15, 23, 42, 0.55),
          0 0 0 1px rgba(56, 189, 248, 0.2),
          inset 0 0 0 1px rgba(15, 23, 42, 0.9);
        transform: translateY(-2px);
      }

      .links a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .links strong {
        display: block;
        font-size: 1.125rem;
        margin-bottom: 8px;
        color: var(--accent-hover);
      }

      .links span {
        font-size: 0.9rem;
        color: var(--text-muted);
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>FlowForge</h1>
      <p class="tagline">Design workflows. Run instances.</p>
      <nav class="links" aria-label="Choose app">
        <a href="developer/">
          <strong>Developer Studio</strong>
          <span>Build algorithms from blocks and set template defaults</span>
        </a>
        <a href="runner/">
          <strong>Runner</strong>
          <span>Run a template instance with focused parameter tweaks</span>
        </a>
      </nav>
    </div>
  </body>
</html>
